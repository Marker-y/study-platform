<script>
var QS=[{"text": "Who proposed 'descent with modification'?", "cA": "Jean-Baptiste Lamarck", "cB": "Charles Darwin", "cC": "Gregor Mendel", "cD": "Alfred Russel Wallace", "ans": "B", "exp": "Darwin described evolution as descent with modification."}, {"text": "Evolution is defined as:", "cA": "Change in an individual during its lifetime", "cB": "Change in relative frequency of alleles in a population over time", "cC": "Acquired characteristics passed to offspring", "cD": "Sudden mutation in a single individual", "ans": "B", "exp": "Modern definition: evolution is change in allele frequencies in a population over generations."}, {"text": "What is a scientific theory?", "cA": "A guess based on limited evidence", "cB": "A well-substantiated explanation confirmed through observation and experimentation", "cC": "An untestable hypothesis", "cD": "A personal opinion", "ans": "B", "exp": "A scientific theory is acquired through the scientific method and repeatedly confirmed."}, {"text": "When did Darwin set sail on the HMS Beagle?", "cA": "1820", "cB": "1831", "cC": "1859", "cD": "1809", "ans": "B", "exp": "Darwin set sail on the HMS Beagle in 1831 to collect specimens from around the world."}, {"text": "What book did Darwin publish in 1859?", "cA": "The Descent of Man", "cB": "On the Origin of Species", "cC": "The Voyage of the Beagle", "cD": "The Structure of Scientific Revolutions", "ans": "B", "exp": "Darwin published On the Origin of Species in 1859, introducing natural selection as the mechanism for evolution."}, {"text": "What was Darwin's key insight about natural selection?", "cA": "Organisms evolve because they want to adapt", "cB": "Individuals with favorable traits are more likely to survive and reproduce", "cC": "All mutations are beneficial", "cD": "Evolution always leads to more complex organisms", "ans": "B", "exp": "Natural selection: individuals with heritable advantageous traits leave more offspring, gradually changing the population over generations."}, {"text": "Which of these is NOT a requirement for natural selection?", "cA": "Variation in traits within a population", "cB": "Heritability of those traits", "cC": "Differential survival and reproduction based on traits", "cD": "All individuals must have identical fitness", "ans": "D", "exp": "Natural selection REQUIRES variation, heritability, and differential reproductive success. If all individuals had identical fitness, there would be no selection pressure."}, {"text": "What is a fossil?", "cA": "A living organism preserved in amber", "cB": "Any preserved remains or traces of ancient organisms", "cC": "A rock formation shaped like an animal", "cD": "A modern species that looks primitive", "ans": "B", "exp": "Fossils include bones, shells, imprints, tracks, feces, or any other preserved evidence of past life."}, {"text": "What does the fossil record show?", "cA": "All species appeared at once", "cB": "Life has changed over time, with simpler forms appearing before complex ones", "cC": "Only dinosaurs existed in the past", "cD": "Humans have always been the dominant species", "ans": "B", "exp": "The fossil record shows a progression: simple prokaryotes → eukaryotes → multicellular life → vertebrates → mammals. This supports common descent."}, {"text": "What is a transitional fossil?", "cA": "A fossil that is halfway between rock and bone", "cB": "A fossil showing intermediate features between two groups", "cC": "A fossil that has not yet been dated", "cD": "A fossil found between layers of sedimentary rock", "ans": "B", "exp": "Transitional fossils (e.g., Archaeopteryx, Tiktaalik) show intermediate characteristics between ancestral and descendant groups, supporting evolutionary relationships."}, {"text": "What is homology?", "cA": "Similarity due to convergent evolution", "cB": "Similarity due to shared ancestry", "cC": "Similarity due to living in similar environments", "cD": "Similarity due to random chance", "ans": "B", "exp": "Homologous structures (e.g., human arm, bat wing, whale flipper) share the same basic structure because they evolved from a common ancestor."}, {"text": "What is an example of a homologous structure?", "cA": "Bird wing and insect wing", "cB": "Human arm and whale flipper", "cC": "Shark fin and dolphin fin", "cD": "Butterfly wing and bat wing", "ans": "B", "exp": "Human arm and whale flipper share the same bone structure (humerus, radius/ulna, carpals, metacarpals, phalanges) inherited from a common ancestor."}, {"text": "What is an analogous structure?", "cA": "Structures with shared ancestry", "cB": "Structures with similar function but different origins", "cC": "Structures that serve no purpose", "cD": "Structures that are identical in all species", "ans": "B", "exp": "Analogous structures (e.g., bird wings and insect wings) evolved independently through convergent adaptation to similar environments/functions."}, {"text": "What is vestigial structure?", "cA": "A newly evolving organ", "cB": "A reduced or non-functional remnant of an ancestral feature", "cC": "A highly developed adaptive trait", "cD": "A structure unique to one species", "ans": "B", "exp": "Vestigial structures (e.g., human appendix, pelvic bones in whales, eyes in blind cave fish) are remnants of structures that were functional in ancestors but are reduced or lost in descendants."}, {"text": "What is an example of vestigial structure?", "cA": "Human heart", "cB": "Pelvic bones in whales and snakes", "cC": "Wings in birds", "cD": "Opposable thumbs in primates", "ans": "B", "exp": "Whales and snakes have tiny pelvic/hind limb bones even though they don't walk — remnants of their four-legged ancestors."}, {"text": "What is biogeography?", "cA": "Study of weather patterns", "cB": "Study of geographic distribution of species", "cC": "Study of soil composition", "cD": "Study of ocean currents", "ans": "B", "exp": "Biogeography studies how species are distributed geographically. Island species often resemble nearby mainland species, supporting evolution by common descent."}, {"text": "What do similarities in embryonic development suggest?", "cA": "Species are unrelated", "cB": "Shared ancestry among vertebrates", "cC": "Embryos are all identical", "cD": "Development patterns are random", "ans": "B", "exp": "Vertebrate embryos (fish, chicken, human) all have pharyngeal pouches and tails at early stages, suggesting they share a common ancestor."}, {"text": "What is molecular evidence for evolution?", "cA": "DNA sequences are completely different across species", "cB": "Closely related species share more DNA/protein similarities", "cC": "All organisms use different genetic codes", "cD": "Molecules cannot provide evolutionary information", "ans": "B", "exp": "The more closely related two species are, the more similar their DNA and protein sequences. Humans and chimps share ~98-99% of DNA."}, {"text": "What is artificial selection?", "cA": "Nature selecting which organisms survive", "cB": "Humans selectively breeding organisms for desired traits", "cC": "Random mating in populations", "cD": "Organisms choosing their own mates", "ans": "B", "exp": "Artificial selection (selective breeding): humans choose which individuals breed (e.g., dog breeds, crop plants). Darwin used this as analogy for natural selection."}, {"text": "What did artificial selection demonstrate to Darwin?", "cA": "That species are fixed and unchanging", "cB": "That dramatic change can occur through selective breeding over generations", "cC": "That only nature can cause evolution", "cD": "That all organisms evolve at the same rate", "ans": "B", "exp": "Artificial selection showed that humans could produce enormous variation (e.g., from wolf to Chihuahua) in relatively few generations — imagine what nature could do over millions of years!"}, {"text": "What is Lamarck's theory of evolution?", "cA": "Natural selection drives evolution", "cB": "Acquired characteristics can be inherited", "cC": "Mutations drive all evolutionary change", "cD": "Species do not change over time", "ans": "B", "exp": "Lamarck proposed that organisms acquire traits during their lifetime (e.g., giraffe stretching neck) and pass them to offspring. This is incorrect — acquired traits are generally NOT inherited."}, {"text": "Why is Lamarck's theory rejected?", "cA": "It predicts too much change", "cB": "Acquired traits are not genetically inherited", "cC": "It only applies to animals", "cD": "It contradicts fossil evidence partially", "ans": "B", "exp": "Genetic inheritance works through DNA passed in gametes. Changes acquired during an organism's lifetime (like bigger muscles from exercise) do not alter DNA in sex cells."}, {"text": "What is a gene pool?", "cA": "All genes in one individual", "cB": "All alleles of all genes in a population", "cC": "Only dominant alleles in a population", "cD": "Only recessive alleles in a population", "ans": "B", "exp": "Gene pool = complete collection of all alleles for every gene in a population. Evolution = changes in this pool's allele frequencies over time."}, {"text": "What is allele frequency?", "cA": "How often a mutation occurs", "cB": "How common an allele is in a population's gene pool", "cC": "The number of genes an individual has", "cD": "The rate of genetic recombination", "ans": "B", "exp": "Allele frequency = proportion of a specific allele among all alleles of that gene in the population. If 80 of 100 alleles are A, frequency of A = 0.8 (80%)."}, {"text": "What causes changes in allele frequencies (evolution)?", "cA": "Only mutation", "cB": "Mutation, gene flow, genetic drift, natural selection", "cC": "Only natural selection", "cD": "Only environmental changes", "ans": "B", "exp": "Four mechanisms of evolution: (1) Mutation creates new alleles, (2) Gene flow moves alleles between populations, (3) Genetic drift randomly changes frequencies, (4) Natural selection favors certain alleles."}, {"text": "What is a mutation?", "cA": "A type of natural selection", "cB": "A change in DNA sequence", "cC": "A type of gene flow", "cD": "A type of genetic drift", "ans": "B", "exp": "Mutation = any change in DNA sequence (point mutations, insertions, deletions, duplications). It is the ultimate source of new genetic variation."}, {"text": "Are all mutations beneficial?", "cA": "Yes, all mutations help organisms survive", "cB": "No, most are neutral or harmful; few are beneficial", "cC": "Mutations are always harmful", "cD": "Mutations only affect physical appearance", "ans": "B", "exp": "Most mutations are neutral (no effect) or harmful (reduce fitness). Rarely, a mutation is beneficial and may spread through natural selection."}, {"text": "What is gene flow (migration)?", "cA": "Random change in allele frequencies", "cB": "Movement of alleles between populations via migration/mating", "cC": "Creation of new alleles through mutation", "cD": "Selection against certain genotypes", "ans": "B", "exp": "Gene flow = transfer of alleles from one population to another (e.g., pollen blowing between fields, animals moving between herds). It tends to make populations more similar."}, {"text": "What effect does gene flow usually have on populations?", "cA": "Makes populations more different", "cB": "Makes populations more genetically similar", "cC": "Causes speciation", "cD": "Reduces overall genetic diversity", "ans": "B", "exp": "Gene flow introduces new alleles and mixes gene pools, reducing differences between populations. Reduced gene flow allows populations to diverge (potentially leading to speciation)."}, {"text": "What is genetic drift?", "cA": "Non-random change in allele frequencies due to selection", "cB": "Random change in allele frequencies due to chance events", "cC": "Purposeful breeding by humans", "cD": "Migration between populations", "ans": "B", "exp": "Genetic drift = random fluctuations in allele frequencies, especially in small populations. Not related to fitness — just luck/chance."}, {"text": "What is the bottleneck effect?", "cA": "A large population suddenly grows", "cB": "A population is drastically reduced, losing genetic diversity", "cC": "Two populations merge together", "cD": "A mutation spreads rapidly", "ans": "B", "exp": "Bottleneck = disaster (fire, flood, hunting) kills most individuals randomly. Survivors' alleles dominate the new gene pool, reducing diversity. Example: cheetahs have very low genetic diversity due to past bottleneck."}, {"text": "What is the founder effect?", "cA": "A large group colonizes a new area", "cB": "A small group breaks away and starts a new population", "cC": "Two populations become isolated", "cD": "A population goes extinct", "ans": "B", "exp": "Founder effect = small group colonizes/isolates, carrying only a subset of original gene pool's alleles. Their allele frequencies differ from source population by chance. Example: Amish communities' high rate of certain genetic disorders."}, {"text": "How does population size affect genetic drift?", "cA": "Drift is stronger in large populations", "cB": "Drift is stronger in small populations", "cC": "Population size doesn't matter", "cD": "Drift only affects plants", "ans": "B", "exp": "Genetic drift is much stronger in small populations because chance events have a larger proportional impact. In large populations, random effects tend to average out."}, {"text": "What is natural selection?", "cA": "Random survival of organisms", "cB": "Differential survival and reproduction based on heritable traits", "cC": "Equal chance for all individuals", "cD": "Organisms choosing their environment", "ans": "B", "exp": "Natural selection = process where individuals with advantageous heritable traits produce more offspring, causing those traits to increase in frequency over generations."}, {"text": "What is directional selection?", "cA": "Both extremes are favored", "cB": "One extreme is favored over the other", "cC": "The intermediate is favored", "cD": "No selection occurs", "ans": "B", "exp": "Directional selection shifts the population's trait distribution toward one extreme. Example: antibiotic resistance (bacteria surviving antibiotics), industrial melanism (darker moths favored in polluted areas)."}, {"text": "What is stabilizing selection?", "cA": "One extreme is favored", "cB": "The intermediate is favored, extremes selected against", "cC": "Both extremes are favored", "cD": "Random mating occurs", "ans": "B", "exp": "Stabilizing selection reduces variation by favoring intermediate phenotypes. Examples: human birth weight (very low or very high weight babies have higher mortality), clutch size in birds."}, {"text": "What is disruptive selection?", "cA": "Intermediate phenotype is favored", "cB": "Both extremes are favored over the intermediate", "cC": "One extreme is favored", "cD": "No phenotype is favored", "ans": "B", "exp": "Disruptive selection favors both extremes over intermediates. Can lead to two distinct phenotypes in a population. Example: different beak sizes in birds where medium beaks are inefficient for any food source."}, {"text": "What is sexual selection?", "cA": "Selection for survival ability", "cB": "Selection for mating success", "cC": "Selection for food-finding ability", "cD": "Selection for disease resistance", "ans": "B", "exp": "Sexual selection = certain traits increase mating success (even if they reduce survival). Includes male-male competition and female choice (peacock's tail, deer antlers)."}, {"text": "What is fitness in evolutionary terms?", "cA": "Physical strength of an organism", "cB": "Ability to survive and reproduce in its environment", "cC": "Speed of an organism", "cD": "Intelligence of an organism", "ans": "B", "exp": "Evolutionary fitness = contribution of an individual's genes to the next generation. Measured by number of viable offspring produced. High fitness ≠ necessarily strongest/fastest."}, {"text": "What is adaptation?", "cA": "An individual adjusting to its environment during its lifetime", "cB": "A heritable trait that increases fitness in a specific environment", "cC": "A learned behavior", "cD": "A temporary physiological response", "ans": "B", "exp": "Adaptation = inherited trait that enhances survival/reproduction in a particular environment. Results from natural selection acting on heritable variation over many generations."}, {"text": "What is a population?", "cA": "All organisms of all species in an area", "cB": "All individuals of one species in a given area", "cC": "All living things on Earth", "cD": "A group of different species interacting", "ans": "B", "exp": "Population = group of interbreeding individuals of the same species living in the same area. Populations (not individuals) are the unit of evolution."}, {"text": "What is speciation?", "cA": "Evolution of a new individual", "cB": "Formation of new and distinct species", "cC": "Extinction of a species", "cD": "Migration of a population", "ans": "B", "exp": "Speciation = process by which one species splits into two or more daughter species. Requires reproductive isolation + genetic divergence."}, {"text": "What is reproductive isolation?", "cA": "Two species living in different places", "cB": "Mechanisms preventing members of different species from producing fertile offspring", "cC": "Two populations having different food sources", "cD": "Species that look different from each other", "ans": "B", "exp": "Reproductive isolation prevents gene flow between populations. Can be prezygotic (before fertilization) or postzygotic (after fertilization). Essential for speciation."}, {"text": "What is allopatric speciation?", "cA": "Speciation without geographic separation", "cB": "Speciation caused by geographic isolation", "cC": "Speciation caused by polyploidy", "cD": "Speciation caused by sexual selection only", "ans": "B", "exp": "Allopatric speciation = speciation with geographic barrier (mountain, river, ocean) separating populations. Gene flow stops, each population evolves independently until they cannot interbreed."}, {"text": "What is sympatric speciation?", "cA": "Speciation with geographic separation", "cB": "Speciation without geographic separation", "cC": "Speciation caused by migration", "cD": "Speciation caused by extinction", "ans": "B", "exp": "Sympatric speciation = new species evolves while living in the same geographic area as parent population. Common in plants (via polyploidy) and animals (via ecological niche differentiation, sexual selection)."}, {"text": "What is polyploidy?", "cA": "Loss of chromosomes", "cB": "Having extra sets of chromosomes", "cC": "Having half the normal chromosomes", "cD": "Chromosome rearrangement without duplication", "ans": "B", "exp": "Polyploidy = organism has more than 2 complete sets of chromosomes (3n, 4n, etc.). Common in plants; instant reproductive isolation from diploid parents → immediate speciation."}, {"text": "What is prezygotic isolation?", "cA": "Hybrid offspring is infertile", "cB": "Prevents mating/fertilization from occurring", "cC": "Hybrid zygote dies", "cD": "Hybrid survives but cannot compete", "ans": "B", "exp": "Prezygotic barriers prevent fertilization: temporal (different mating seasons), behavioral (different courtship rituals), mechanical (incompatible genitalia), gametic (gametes cannot fuse)."}, {"text": "What is postzygotic isolation?", "cA": "Prevents mating from happening", "cB": "Hybrid zygote forms but fails to develop normally", "cC": "Increases hybrid fitness", "cD": "Makes hybrids more fertile", "ans": "B", "exp": "Postzygotic barriers: hybrid inviability (embryo dies), hybrid sterility (mule = horse × donkey, sterile), hybrid breakdown (F2 generation weak/sterile)."}, {"text": "What is the biological species concept?", "cA": "Species defined by physical appearance", "cB": "Group of populations that can interbreed and produce fertile offspring", "cC": "Species defined by ecological niche", "cD": "Species defined by genetic similarity only", "ans": "B", "exp": "Biological Species Concept (Mayr): species = group of actually or potentially interbreeding natural populations reproductively isolated from others. Limitation: doesn't apply well to asexual/extinct species."}, {"text": "What is gradualism?", "cA": "Evolution happens in sudden jumps", "cB": "Evolution occurs slowly through accumulation of small changes", "cC": "Species never change", "cD": "Evolution only affects physical traits", "ans": "B", "exp": "Gradualism = evolution proceeds slowly with many intermediate forms. Large changes accumulate from countless small changes over long periods. Classic Darwinian view."}, {"text": "What is punctuated equilibrium?", "cA": "Evolution always occurs at a constant rate", "cB": "Long periods of stasis interrupted by rapid bursts of change", "cC": "Evolution only happens in equilibrium conditions", "cD": "Species appear instantly without ancestors", "ans": "B", "exp": "Punctuated equilibrium (Gould & Eldredge): species remain stable for long periods (stasis), then rapid speciation occurs (often <10,000 years). Explains gaps in fossil record."}, {"text": "What is convergent evolution?", "cA": "Related species becoming more different", "cB": "Unrelated species independently evolving similar traits", "cC": "Species merging into one", "cD": "Species becoming extinct simultaneously", "ans": "B", "exp": "Convergent evolution: unrelated species develop similar adaptations to similar environmental challenges. Examples: shark (fish) and dolphin (mammal) body shapes; wings in bats, birds, insects."}, {"text": "What is divergent evolution?", "cA": "Unrelated species becoming more similar", "cB": "Related species becoming increasingly different from each other", "cC": "Two species merging into one", "cD": "Species staying unchanged", "ans": "B", "exp": "Divergent evolution: related species evolve different traits from a common ancestor due to different selective pressures. Adaptive radiation (Darwin's finches) is a classic example."}, {"text": "What is adaptive radiation?", "cA": "One species going extinct", "cB": "Rapid diversification of an ancestral species into many forms", "cC": "Two species becoming identical", "cD": "Slow, uniform evolution", "ans": "B", "exp": "Adaptive radiation = single ancestral species rapidly diversifies into many species, each adapted to a specific niche. Examples: Darwin's finches (Galápagos), Hawaiian honeycreepers, mammalian radiation after dinosaur extinction."}, {"text": "What is coevolution?", "cA": "Two unrelated species evolving independently", "cB": "Reciprocal evolutionary change between interacting species", "cC": "Evolution toward a common ancestor", "cD": "Species stopping evolution", "ans": "B", "exp": "Coevolution = two species exert selective pressure on each other, driving reciprocal evolutionary changes. Examples: flowers and their pollinators, predator-prey arms races, host-parasite relationships."}, {"text": "What is Hardy-Weinberg equilibrium?", "cA": "A state where evolution is actively occurring", "cB": "A model describing a non-evolving population", "cC": "A measure of mutation rates", "cD": "A type of natural selection", "ans": "B", "exp": "Hardy-Weinberg principle: allele frequencies remain constant from generation to generation if no evolution occurs. Serves as null hypothesis — deviations indicate evolutionary forces at work."}, {"text": "What are the five conditions for H-W equilibrium?", "cA": "Large population, no mutation, no migration, random mating, no selection", "cB": "Small population, high mutation, migration, selective mating, strong selection", "cC": "Isolation, competition, adaptation, variation, inheritance", "cD": "Predation, resource limitation, territoriality, dominance hierarchies, cooperation", "ans": "A", "exp": "H-W requires: (1) No mutations, (2) Random mating, (3) No gene flow, (4) Infinitely large population (no genetic drift), (5) No natural selection. Violation of ANY condition causes evolution."}, {"text": "In H-W equilibrium, p + q =", "cA": "0", "cB": "1", "cC": "2", "cD": "0.5", "ans": "B", "exp": "p + q = 1, where p = frequency of dominant allele, q = frequency of recessive allele. Also p² + 2pq + q² = 1 (genotype frequencies)."}, {"text": "If q = 0.3, what is the frequency of homozygous recessive individuals?", "cA": "0.3", "cB": "0.09", "cC": "0.42", "cD": "0.49", "ans": "B", "exp": "Frequency of homozygous recessive (aa) = q² = (0.3)² = 0.09 or 9%. Frequency of heterozygous (Aa) = 2pq = 2(0.7)(0.3) = 0.42. Frequency of homozygous dominant (AA) = p² = (0.7)² = 0.49."}, {"text": "What is macroevolution?", "cA": "Changes within a population", "cB": "Large-scale evolutionary patterns above species level", "cC": "Microscopic genetic changes", "cD": "Individual organism development", "ans": "B", "exp": "Macroevolution = major evolutionary changes: origin of new groups, mass extinctions, adaptive radiations, trends (increase in complexity). Contrasts with microevolution (changes in allele frequencies within populations)."}, {"text": "What is microevolution?", "cA": "Origin of new species", "cB": "Changes in allele frequencies within a population", "cC": "Mass extinction events", "cD": "Development of complex organs", "ans": "B", "exp": "Microevolution = generational change in allele frequencies within a population. Mechanisms: mutation, gene flow, genetic drift, natural selection. Observable in short time frames (e.g., antibiotic resistance, peppered moths)."}, {"text": "What is the molecular clock?", "cA": "All species evolve at the same rate", "cB": "Neutral mutations accumulate at roughly constant rate, used to estimate divergence times", "cC": "DNA never changes", "cD": "Proteins evolve faster than DNA", "ans": "B", "exp": "Molecular clock hypothesis: neutral mutations accumulate at a relatively constant rate. By comparing DNA differences between species, we can estimate when they last shared a common ancestor."}, {"text": "What is horizontal gene transfer?", "cA": "Parent passing genes to offspring", "cB": "Transfer of genes between organisms other than by reproduction", "cC": "Mutation creating new genes", "cD": "Recombination during meiosis", "ans": "B", "exp": "Horizontal gene transfer = movement of genetic material between organisms other than vertical (parent-to-offspring) transmission. Common in bacteria (plasmids, transformation, transduction). Important in evolution of antibiotic resistance."}, {"text": "What is exaptation?", "cA": "A trait that loses its function", "cB": "A trait that evolved for one purpose but is co-opted for another", "cC": "A brand-new mutation", "cD": "A trait under strong selection", "ans": "B", "exp": "Exaptation = feature co-opted for a use it was not originally produced by natural selection to serve. Example: bird feathers originally for thermoregulation, later adapted for flight."}, {"text": "What is the most important factor in natural selection?", "cA": "Size of the organism", "cB": "Heritable variation that affects reproductive success", "cC": "Age of the organism", "cD": "Geographic location", "ans": "B", "exp": "For natural selection to operate, there must be heritable variation that affects an organism's fitness (ability to survive and reproduce). Without such variation, there is nothing for selection to act upon."}, {"text": "Can individuals evolve?", "cA": "Yes, individuals can evolve during their lifetime", "cB": "No, only populations evolve over generations", "cC": "Only humans can evolve", "cD": "Only single-celled organisms can evolve", "ans": "B", "exp": "Individuals do NOT evolve — they either live or die, reproduce or not. Evolution is a population-level process that occurs across generations through changes in allele frequencies."}, {"text": "What is the relationship between genotype and phenotype?", "cA": "Genotype determines phenotype exactly", "cB": "Genotype + environment → phenotype", "cC": "Phenotype determines genotype", "cD": "They are unrelated", "ans": "B", "exp": "Phenotype = observable traits resulting from interaction between genotype (genetic makeup) and environment. Same genotype can produce different phenotypes in different environments (e.g., height affected by nutrition)."}, {"text": "What is a balanced polymorphism?", "cA": "One allele becomes fixed in a population", "cB": "Multiple alleles maintained in a population by selection", "cC": "All alleles are equally common", "cD": "No genetic variation exists", "ans": "B", "exp": "Balanced polymorphism = two or more alleles maintained in a population at stable frequencies. Mechanisms: heterozygote advantage (sickle cell), frequency-dependent selection, environmental variation in space/time."}, {"text": "What is heterozygote advantage?", "cA": "Homozygous dominant has highest fitness", "cB": "Heterozygote has higher fitness than either homozygote", "cC": "Homozygous recessive has highest fitness", "cD": "All genotypes have equal fitness", "ans": "B", "exp": "Heterozygote advantage maintains both alleles in population. Classic example: sickle cell trait — heterozygotes (AS) resistant to malaria; AA = malaria susceptible; SS = sickle cell disease. Both alleles persist."}, {"text": "What is frequency-dependent selection?", "cA": "Fitness depends on size", "cB": "Fitness of a phenotype depends on its frequency in the population", "cC": "Fitness is always constant", "cD": "Selection favors rare phenotypes only", "ans": "B", "exp": "Frequency-dependent selection: fitness of a phenotype increases or decreases depending on how common it is. Can be positive (common phenotypes favored) or negative (rare phenotypes favored, maintaining variation)."}, {"text": "What is a ring species?", "cA": "Species arranged in a circle geographically", "cB": "Connected series of neighboring populations that can interbreed except at the ends", "cC": "Species that form rings physically", "cD": "Extinct species leaving ring-shaped fossils", "ans": "B", "exp": "Ring species: chain of populations (A-B-C-D-E) where each adjacent pair can interbreed, but end populations (A and E) cannot. Illustrates gradual transition from one species to another. Example: Ensatina salamanders around California's Central Valley."}, {"text": "What is hybrid zone?", "cA": "Area where two species are completely separate", "cB": "Region where members of different species meet and mate, producing hybrids", "cC": "Area of extinction", "cD": "Zone of purebred populations only", "ans": "B", "exp": "Hybrid zone = geographic region where interbreeding occurs between two distinct species/populations. Hybrids may be less fit (reinforcing isolation), equally fit (stable hybrid zone), or more fit (fusion of species)."}, {"text": "What is the difference between ontogeny and phylogeny?", "cA": "They are the same thing", "cB": "Ontogeny = individual development; phylogeny = evolutionary history", "cC": "Ontogeny = evolution; phylogeny = development", "cD": "Ontogeny = genetics; phylogeny = anatomy", "ans": "B", "exp": "Ontogeny = development of an individual organism from embryo to adult. Phylogeny = evolutionary history and relationships among species/groups. \"Ontogeny recapitulates phylogeny\" is an outdated oversimplification."}, {"text": "What is a clade?", "cA": "Any group of related organisms", "cB": "A monophyletic group including ancestor and ALL descendants", "cC": "A paraphyletic group", "cD": "A polyphyletic group", "ans": "B", "exp": "Clade = monophyletic group: includes a common ancestor and ALL of its descendants. Fundamental unit of cladistics/phylogenetic classification. Example: mammals and all descendants of the first mammal form a clade."}, {"text": "What is a phylogenetic tree?", "cA": "A real plant showing relationships", "cB": "Diagram showing evolutionary relationships among species", "cC": "A family tree of individuals", "cD": "A map of geographic distribution", "ans": "B", "exp": "Phylogenetic tree = branching diagram representing evolutionary relationships. Branching points (nodes) = common ancestors; branch length often represents amount of evolutionary change or time. Tips = extant or extinct taxa."}];

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 Study Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --accent: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --purple: #8B5CF6;
            --bg: #F0F4F8;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1E40AF, #3B82F6); color: white; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; }
        .header-brand .logo { background: white; color: var(--primary); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; }
        .header-nav { display: flex; gap: 8px; }
        .header-nav button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .header-nav button:hover, .header-nav button.active { background: white; color: var(--primary); }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-title { font-size: 18px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .item-card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .item-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .item-card .subject { font-size: 12px; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .item-card .name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .item-card .meta { font-size: 13px; color: var(--text-light); }
        .item-card .actions { display: flex; gap: 8px; margin-top: 12px; opacity: 0; transition: opacity 0.2s; }
        .item-card:hover .actions { opacity: 1; }
        .item-card .actions button { padding: 6px 12px; font-size: 12px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light); }
        .modal-body { padding: 20px; overflow-y: auto; max-height: 60vh; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-textarea { min-height: 120px; resize: vertical; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .tag-mcq { background: #DBEAFE; color: #1E40AF; }
        .tag-frq { background: #D1FAE5; color: #065F46; }
        .tag-guide { background: #F3E8FF; color: #7C3AED; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="logo">01</div>
            <span>Study Platform</span>
        </div>
        <nav class="header-nav">
            <button class="active" onclick="showPage('practice')">Practice</button>
            <button onclick="showPage('guides')">Study Guides</button>
            <button onclick="showPage('history')">History</button>
        </nav>
        <div class="header-actions">
            <span id="userRole" style="font-size:13px;opacity:0.9;">Guest</span>
            <button class="btn btn-secondary" onclick="toggleAdmin()">Admin</button>
        </div>
    </header>

    <main class="main">
        <!-- Practice Page -->
        <div id="page-practice" class="page active">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Practice Sets</h2>
                    <button id="btnAddSet" class="btn btn-primary" style="display:none;" onclick="openModal('set')">+ Add Set</button>
                </div>
                <div id="setsList" class="grid"></div>
            </div>
        </div>

        <!-- Study Guides Page -->
        <div id="page-guides" class="page">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Study Guides</h2>
                    <button id="btnAddGuide" class="btn btn-primary" style="display:none;" onclick="openModal('guide')">+ Add Guide</button>
                </div>
                <div id="guidesList" class="grid"></div>
            </div>
        </div>

        <!-- History Page -->
        <div id="page-history" class="page">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Study History</h2>
                    <button class="btn btn-secondary" onclick="clearHistory()">Clear History</button>
                </div>
                <div id="historyList"></div>
            </div>
        </div>
    </main>

    <!-- Quiz Modal -->
    <div id="quizModal" class="modal-overlay">
        <div class="modal" style="max-width:800px;">
            <div class="modal-header">
                <div>
                    <div id="quizTitle" style="font-weight:700;"></div>
                    <div id="quizTimer" style="font-size:13px;color:var(--text-light);margin-top:4px;"></div>
                </div>
                <button class="modal-close" onclick="closeQuiz()">&times;</button>
            </div>
            <div class="modal-body" id="quizBody"></div>
            <div class="modal-footer" id="quizFooter"></div>
        </div>
    </div>

    <!-- Guide View Modal -->
    <div id="guideModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div id="guideViewTitle" style="font-weight:700;"></div>
                <button class="modal-close" onclick="closeGuideView()">&times;</button>
            </div>
            <div class="modal-body" id="guideViewBody" style="line-height:1.7;"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div id="editTitle" class="modal-title"></div>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body" id="editBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

<script>
// ==================== DATA STORAGE ====================
const STORAGE_KEY = 'study_platform_v2';
const ADMIN_PASS = '01admin2026';

let isAdmin = false;
let currentEditId = null;
let currentEditType = null;
let currentQuiz = null;
let currentQuestion = 0;
let quizAnswers = {};
let quizTimer = null;
let quizStartTime = null;
let quizTimeLimit = null;

function getData() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : { sets: [], guides: [], history: [] };
}

function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ==================== INITIAL DATA ====================
function initData() {
    const data = getData();
    if (data.sets.length === 0 && data.guides.length === 0) {
        // Evolution MCQ Set
        data.sets.push({
            id: 'evo_mcq',
            name: 'Evolution - Multiple Choice',
            subject: 'Biology',
            type: 'mcq',
            questions: [
                {q: 'What is evolution?', options: ['Change in species over time', 'Creation of new planets', 'Study of rocks', 'Movement of continents'], ans: 0, exp: 'Evolution is the change in the heritable characteristics of biological populations over successive generations.'},
                {q: 'Who proposed the theory of natural selection?', options: ['Lamarck', 'Darwin', 'Mendel', 'Newton'], ans: 1, exp: 'Charles Darwin proposed the theory of natural selection in his book "On the Origin of Species" (1859).'},
                {q: 'What is the ultimate source of genetic variation?', options: ['Natural selection', 'Mutation', 'Gene flow', 'Genetic drift'], ans: 1, exp: 'Mutations are the ultimate source of all new genetic variation.'},
                {q: 'Which of the following is NOT a requirement for natural selection?', options: ['Variation exists', 'Variation is heritable', 'More offspring than can survive', 'All individuals have equal reproductive success'], ans: 3, exp: 'Natural selection requires differential reproductive success - not all individuals reproduce equally.'},
                {q: 'What is adaptive radiation?', options: ['Rapid diversification of a single ancestor into many species', 'Movement of species to new habitats', 'Extinction of many species', 'Slow gradual change over millions of years'], ans: 0, exp: 'Adaptive radiation is the rapid diversification of a single ancestral species into many new forms.'},
                {q: 'What are homologous structures?', options: ['Same function, different origin', 'Same origin, different function', 'No function at all', 'Identical in all species'], ans: 1, exp: 'Homologous structures share a common ancestry but may have different functions (e.g., human arm, whale flipper, bat wing).'},
                {q: 'What is the founder effect?', options: ['Large population migration', 'Few individuals establish new population', 'Species goes extinct', 'Rapid population growth'], ans: 1, exp: 'Founder effect occurs when a small group establishes a new population with limited genetic diversity.'},
                {q: 'What type of selection favors intermediate phenotypes?', options: ['Directional', 'Stabilizing', 'Disruptive', 'Artificial'], ans: 1, exp: 'Stabilizing selection favors intermediate phenotypes and selects against extreme variations.'},
                {q: 'What is genetic drift?', options: ['Random change in allele frequencies', 'Movement of genes between populations', 'Deliberate breeding by humans', 'Environmental adaptation'], ans: 0, exp: 'Genetic drift is random change in allele frequencies, especially strong in small populations.'},
                {q: 'What is convergent evolution?', options: ['Same ancestor, different functions', 'Different ancestors, similar functions', 'No evolution occurs', 'Species merge together'], ans: 1, exp: 'Convergent evolution produces analogous structures - similar functions but different evolutionary origins.'}
            ]
        });

        // Evolution FRQ Set
        data.sets.push({
            id: 'evo_frq',
            name: 'Evolution - Free Response',
            subject: 'Biology',
            type: 'frq',
            questions: [
                {q: 'Explain the four observations and two inferences that form the basis of Darwin\'s theory of natural selection.', keyTerms: ['overproduction','variation','heritable','struggle','differential survival','adaptation','fitness'], hint: 'Think about: 1) Overproduction of offspring 2) Variation exists 3) Traits are heritable 4) Competition for resources. Then: individuals with favorable traits survive and reproduce, passing those traits to offspring.'},
                {q: 'Compare and contrast Lamarck\'s and Darwin\'s theories of evolution.', keyTerms: ['acquired characteristics','use and disuse','natural selection','environment','inheritance','adaptation'], hint: 'Lamarck: inheritance of acquired characteristics (use/disuse). Darwin: natural selection acts on variation, favorable traits increase in population over time.'},
                {q: 'Describe three types of evidence that support the theory of evolution.', keyTerms: ['fossil','homology','biogeography','embryology','DNA','vestigial'], hint: 'Consider: fossil record (transitional forms), homology (similar structures), biogeography (geographic distribution), embryology (similar development), molecular evidence (DNA/proteins), vestigial structures.'},
                {q: 'Explain the difference between allopatric and sympatric speciation.', keyTerms: ['geographic barrier','reproductive isolation','physical separation','same area','polyploidy'], hint: 'Allopatric: geographic barrier separates populations. Sympatric: speciation without geographic barrier (e.g., polyploidy in plants).'},
                {q: 'Describe the three types of natural selection and give an example of each.', keyTerms: ['directional','stabilizing','disruptive','extreme','intermediate','peppered moth','birth weight','seedcracker'], hint: 'Directional: favors one extreme (peppered moths). Stabilizing: favors intermediate (human birth weight). Disruptive: favors both extremes (seedcracker finches).'}
            ]
        });

        // Evolution Study Guide
        data.guides.push({
            id: 'evo_guide',
            name: 'Evolution Study Guide',
            subject: 'Biology',
            content: `<h2>1. What is Evolution?</h2>
<p>Evolution is the <strong>change in the heritable characteristics</strong> of biological populations over successive generations. It explains the diversity of life on Earth.</p>

<h2>2. Key Terms</h2>
<ul>
<li><strong>Population:</strong> Group of organisms of the same species living in the same area</li>
<li><strong>Gene pool:</strong> All the genes (alleles) present in a population</li>
<li><strong>Allele frequency:</strong> How common an allele is in the population</li>
<li><strong>Fitness:</strong> Ability to survive and reproduce in a particular environment</li>
<li><strong>Adaptation:</strong> Heritable trait that increases an organism's fitness</li>
</ul>

<h2>3. Darwin's Voyage & Observations</h2>
<p><strong>Galapagos Islands:</strong> Darwin observed finches with different beak shapes adapted to different food sources on different islands.</p>
<p><strong>Key observation:</strong> Species on islands resembled species on the nearest mainland but were adapted to local conditions.</p>

<h2>4. Darwin's Four Observations</h2>
<ol>
<li><strong>Traits are often heritable</strong> - passed from parents to offspring</li>
<li><strong>Offspring vary</strong> in their heritable traits</li>
<li><strong>Species overproduce offspring</strong> - more are born than can survive</li>
<li><strong>Resources are limited</strong> - competition for survival</li>
</ol>

<h2>5. Darwin's Two Inferences</h2>
<ol>
<li><strong>Differential survival:</strong> Individuals with favorable traits leave more offspring (higher fitness)</li>
<li><strong>Accumulation of traits:</strong> Favorable traits accumulate in populations over generations</li>
</ol>

<h2>6. Types of Selection</h2>
<table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;">
<tr style="background:#f0f4f8;"><th>Type</th><th>Description</th><th>Example</th></tr>
<tr><td><strong>Stabilizing</strong></td><td>Favors intermediate phenotypes</td><td>Human birth weight</td></tr>
<tr><td><strong>Directional</strong></td><td>Favors one extreme</td><td>Peppered moths (industrial revolution)</td></tr>
<tr><td><strong>Disruptive</strong></td><td>Favors both extremes</td><td>Seedcracker finches (small/large beaks)</td></tr>
</table>

<h2>7. Evidence for Evolution</h2>
<ul>
<li><strong>Direct observation:</strong> Antibiotic resistance, pesticide resistance</li>
<li><strong>Homology:</strong> Similar structures from common ancestry (human arm, whale flipper, bat wing)</li>
<li><strong>Fossil record:</strong> Transitional forms, principle of superposition</li>
<li><strong>Biogeography:</strong> Geographic distribution of species (continental drift)</li>
<li><strong>Molecular evidence:</strong> Conserved genes (Hox genes), cytochrome c</li>
<li><strong>Vestigial structures:</strong> Reduced/non-functional structures (whale pelvis, human appendix)</li>
</ul>

<h2>8. Mechanisms of Evolution</h2>
<ul>
<li><strong>Natural selection:</strong> Differential survival and reproduction based on heritable traits</li>
<li><strong>Mutation:</strong> Ultimate source of new genetic variation</li>
<li><strong>Gene flow:</strong> Movement of alleles between populations (makes populations more similar)</li>
<li><strong>Genetic drift:</strong> Random change in allele frequencies (strongest in small populations)</li>
<li><strong>Bottleneck effect:</strong> Drastic population reduction (cheetahs)</li>
<li><strong>Founder effect:</strong> Small group establishes new population</li>
</ul>

<h2>9. Speciation</h2>
<ul>
<li><strong>Allopatric speciation:</strong> Geographic barrier separates populations</li>
<li><strong>Sympatric speciation:</strong> Speciation without geographic barrier (polyploidy in plants)</li>
<li><strong>Reproductive isolation:</strong> Prevents gene flow between species</li>
</ul>

<h2>10. Lamarck vs Darwin</h2>
<table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;">
<tr style="background:#f0f4f8;"><th>Lamarck</th><th>Darwin</th></tr>
<tr><td>Inheritance of acquired characteristics</td><td>Natural selection</td></tr>
<tr><td>Use and disuse</td><td>Variation exists naturally</td></tr>
<tr><td>Tendency toward perfection</td><td>Environment selects favorable traits</td></tr>
<tr><td><strong>WRONG:</strong> Acquired traits not inherited</td><td><strong>CORRECT:</strong> Heritable variation selected</td></tr>
</table>

<h2>11. Important People</h2>
<ul>
<li><strong>Darwin:</strong> Natural selection, "On the Origin of Species" (1859)</li>
<li><strong>Lamarck:</strong> Inheritance of acquired characteristics</li>
<li><strong>Lyell:</strong> Uniformitarianism (geological processes constant over time)</li>
<li><strong>Hutton:</strong> Gradualism (slow geological change)</li>
<li><strong>Cuvier:</strong> Catastrophism</li>
<li><strong>Malthus:</strong> Population growth outpaces resources</li>
</ul>

<h2>12. Key Concepts to Remember</h2>
<ul>
<li>Natural selection acts on <strong>phenotypes</strong>, not genotypes directly</li>
<li>Fitness is <strong>relative reproductive success</strong>, not strength or speed</li>
<li>Mutations are <strong>random</strong>; selection is <strong>non-random</strong></li>
<li>Evolution occurs in <strong>populations</strong>, not individuals</li>
<li>Common ancestry explains <strong>homology</strong>; similar environments explain <strong>analogy</strong></li>
</ul>`
        });

        saveData(data);
    }
}

// ==================== UI FUNCTIONS ====================
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    if (page === 'practice') renderSets();
    if (page === 'guides') renderGuides();
    if (page === 'history') renderHistory();
}

function toggleAdmin() {
    if (isAdmin) {
        isAdmin = false;
        document.getElementById('userRole').textContent = 'Guest';
        document.getElementById('btnAddSet').style.display = 'none';
        document.getElementById('btnAddGuide').style.display = 'none';
    } else {
        const pass = prompt('Enter admin password:');
        if (pass === ADMIN_PASS) {
            isAdmin = true;
            document.getElementById('userRole').textContent = 'Admin';
            document.getElementById('btnAddSet').style.display = 'block';
            document.getElementById('btnAddGuide').style.display = 'block';
        } else {
            alert('Incorrect password');
        }
    }
    renderSets();
    renderGuides();
}

// ==================== SETS / PRACTICE ====================
function renderSets() {
    const data = getData();
    const container = document.getElementById('setsList');
    
    if (data.sets.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📚</div><h3>No Practice Sets</h3><p>Admin can add new sets</p></div>`;
        return;
    }
    
    container.innerHTML = data.sets.map(set => `
        <div class="item-card" onclick="${isAdmin ? '' : `startQuiz('${set.id}')`}">
            <div class="subject">${set.subject}</div>
            <div class="name">${set.name}</div>
            <div class="meta">${set.questions.length} questions • <span class="tag tag-${set.type}">${set.type.toUpperCase()}</span></div>
            ${isAdmin ? `<div class="actions" onclick="event.stopPropagation()">
                <button class="btn btn-primary" onclick="startQuiz('${set.id}')">Start</button>
                <button class="btn btn-secondary" onclick="editItem('${set.id}', 'set')">Edit</button>
                <button class="btn btn-danger" onclick="deleteItem('${set.id}', 'set')">Delete</button>
            </div>` : ''}
        </div>
    `).join('');
}

// ==================== STUDY GUIDES ====================
function renderGuides() {
    const data = getData();
    const container = document.getElementById('guidesList');
    
    if (data.guides.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📖</div><h3>No Study Guides</h3><p>Admin can add new guides</p></div>`;
        return;
    }
    
    container.innerHTML = data.guides.map(guide => `
        <div class="item-card" onclick="${isAdmin ? '' : `viewGuide('${guide.id}')`}">
            <div class="subject">${guide.subject}</div>
            <div class="name">${guide.name}</div>
            <div class="meta"><span class="tag tag-guide">GUIDE</span></div>
            ${isAdmin ? `<div class="actions" onclick="event.stopPropagation()">
                <button class="btn btn-primary" onclick="viewGuide('${guide.id}')">View</button>
                <button class="btn btn-secondary" onclick="editItem('${guide.id}', 'guide')">Edit</button>
                <button class="btn btn-danger" onclick="deleteItem('${guide.id}', 'guide')">Delete</button>
            </div>` : ''}
        </div>
    `).join('');
}

function viewGuide(id) {
    const data = getData();
    const guide = data.guides.find(g => g.id === id);
    if (!guide) return;
    
    document.getElementById('guideViewTitle').textContent = guide.name;
    document.getElementById('guideViewBody').innerHTML = guide.content;
    document.getElementById('guideModal').classList.add('active');
    
    // Record history
    addHistory('guide', guide.name, guide.subject);
}

function closeGuideView() {
    document.getElementById('guideModal').classList.remove('active');
}

// ==================== QUIZ SYSTEM ====================
function startQuiz(setId) {
    const data = getData();
    const set = data.sets.find(s => s.id === setId);
    if (!set) return;
    
    currentQuiz = set;
    currentQuestion = 0;
    quizAnswers = {};
    quizStartTime = Date.now();
    
    // Check for saved progress
    const saved = localStorage.getItem('quiz_progress_' + setId);
    if (saved) {
        const progress = JSON.parse(saved);
        if (confirm('Resume from where you left off?')) {
            currentQuestion = progress.q;
            quizAnswers = progress.ans || {};
        }
    }
    
    // Timer setup
    const timerChoice = prompt('Timer mode:\n1 = Count up (track time)\n2 = Set time limit (minutes)', '1');
    if (timerChoice === '2') {
        const mins = parseInt(prompt('Enter time limit in minutes:', '10'));
        if (mins > 0) quizTimeLimit = mins * 60 * 1000;
    }
    
    document.getElementById('quizTitle').textContent = set.name;
    document.getElementById('quizModal').classList.add('active');
    
    startQuizTimer();
    renderQuestion();
}

function startQuizTimer() {
    updateTimerDisplay();
    quizTimer = setInterval(() => {
        updateTimerDisplay();
        if (quizTimeLimit) {
            const elapsed = Date.now() - quizStartTime;
            if (elapsed >= quizTimeLimit) {
                clearInterval(quizTimer);
                alert('Time is up!');
                finishQuiz();
            }
        }
    }, 1000);
}

function updateTimerDisplay() {
    const elapsed = Date.now() - quizStartTime;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    let text = `Time: ${mins}:${secs.toString().padStart(2, '0')}`;
    
    if (quizTimeLimit) {
        const remaining = quizTimeLimit - elapsed;
        const remMins = Math.floor(remaining / 60000);
        const remSecs = Math.floor((remaining % 60000) / 1000);
        text += ` | Remaining: ${remMins}:${remSecs.toString().padStart(2, '0')}`;
    }
    
    text += ` | Question ${currentQuestion + 1}/${currentQuiz.questions.length}`;
    document.getElementById('quizTimer').textContent = text;
}

function renderQuestion() {
    const q = currentQuiz.questions[currentQuestion];
    const body = document.getElementById('quizBody');
    const footer = document.getElementById('quizFooter');
    
    if (currentQuiz.type === 'mcq') {
        body.innerHTML = `
            <div style="font-size:16px;margin-bottom:20px;font-weight:600;">${q.q}</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                ${q.options.map((opt, i) => `
                    <label style="padding:12px;border:2px solid ${quizAnswers[currentQuestion] === i ? 'var(--primary)' : 'var(--border)'};border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;">
                        <input type="radio" name="ans" value="${i}" ${quizAnswers[currentQuestion] === i ? 'checked' : ''} onchange="quizAnswers[${currentQuestion}] = ${i}; renderQuestion();">
                        <span>${String.fromCharCode(65+i)}. ${opt}</span>
                    </label>
                `).join('')}
            </div>
        `;
    } else {
        // FRQ
        body.innerHTML = `
            <div style="font-size:16px;margin-bottom:20px;font-weight:600;">${q.q}</div>
            ${q.hint ? `<div style="background:#FEF3C7;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;color:#92400E;"><strong>Hint:</strong> ${q.hint}</div>` : ''}
            <textarea id="frqAnswer" class="form-textarea" placeholder="Type your answer here...">${quizAnswers[currentQuestion] || ''}</textarea>
        `;
    }
    
    footer.innerHTML = `
        <button class="btn btn-secondary" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>Previous</button>
        <button class="btn btn-secondary" onclick="saveProgress()">Save & Exit</button>
        ${currentQuestion < currentQuiz.questions.length - 1 
            ? `<button class="btn btn-primary" onclick="nextQuestion()">Next</button>`
            : `<button class="btn btn-success" onclick="finishQuiz()">Finish</button>`
        }
    `;
    
    // Auto-save every 10 seconds
    setTimeout(() => autoSave(), 10000);
}

function nextQuestion() {
    if (currentQuiz.type === 'frq') {
        const ans = document.getElementById('frqAnswer').value;
        quizAnswers[currentQuestion] = ans;
    }
    currentQuestion++;
    renderQuestion();
}

function prevQuestion() {
    if (currentQuiz.type === 'frq') {
        const ans = document.getElementById('frqAnswer').value;
        quizAnswers[currentQuestion] = ans;
    }
    currentQuestion--;
    renderQuestion();
}

function autoSave() {
    if (document.getElementById('quizModal').classList.contains('active')) {
        saveProgress(true);
    }
}

function saveProgress(silent = false) {
    if (currentQuiz.type === 'frq') {
        const ans = document.getElementById('frqAnswer').value;
        quizAnswers[currentQuestion] = ans;
    }
    
    localStorage.setItem('quiz_progress_' + currentQuiz.id, JSON.stringify({
        q: currentQuestion,
        ans: quizAnswers,
        time: Date.now() - quizStartTime
    }));
    
    if (!silent) {
        alert('Progress saved! You can resume later.');
        closeQuiz();
    }
}

function finishQuiz() {
    if (currentQuiz.type === 'frq') {
        const ans = document.getElementById('frqAnswer').value;
        quizAnswers[currentQuestion] = ans;
    }
    
    clearInterval(quizTimer);
    
    // Calculate score
    let correct = 0;
    let results = '';
    
    if (currentQuiz.type === 'mcq') {
        currentQuiz.questions.forEach((q, i) => {
            const userAns = quizAnswers[i];
            const isCorrect = userAns === q.ans;
            if (isCorrect) correct++;
            results += `<div style="padding:12px;border:2px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'};border-radius:8px;margin-bottom:10px;">
                <strong>Q${i+1}:</strong> ${q.q}<br>
                <span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}">Your answer: ${userAns !== undefined ? String.fromCharCode(65+userAns) : 'Not answered'}</span><br>
                ${!isCorrect ? `<span style="color:var(--success)">Correct: ${String.fromCharCode(65+q.ans)}</span><br>` : ''}
                <small style="color:var(--text-light)">${q.exp}</small>
            </div>`;
        });
        
        const score = Math.round((correct / currentQuiz.questions.length) * 100);
        document.getElementById('quizBody').innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:48px;margin-bottom:10px;">${score >= 80 ? '🎉' : score >= 60 ? '👍' : '💪'}</div>
                <h2>Score: ${correct}/${currentQuiz.questions.length} (${score}%)</h2>
                <p style="color:var(--text-light);">Time: ${formatTime(Date.now() - quizStartTime)}</p>
            </div>
            ${results}
        `;
    } else {
        // FRQ grading
        currentQuiz.questions.forEach((q, i) => {
            const userAns = (quizAnswers[i] || '').toLowerCase();
            const foundTerms = q.keyTerms.filter(term => userAns.includes(term.toLowerCase()));
            const termScore = Math.round((foundTerms.length / q.keyTerms.length) * 100);
            
            results += `<div style="padding:12px;border:2px solid ${termScore >= 60 ? 'var(--success)' : 'var(--danger)'};border-radius:8px;margin-bottom:10px;">
                <strong>Q${i+1}:</strong> ${q.q}<br>
                <div style="margin:8px 0;padding:8px;background:#f8fafc;border-radius:4px;"><strong>Your answer:</strong><br>${quizAnswers[i] || 'Not answered'}</div>
                <div style="color:${termScore >= 60 ? 'var(--success)' : 'var(--danger)'}">Key terms found: ${foundTerms.length}/${q.keyTerms.length} (${termScore}%)</div>
                <small style="color:var(--text-light)">Expected terms: ${q.keyTerms.join(', ')}</small>
            </div>`;
        });
        
        document.getElementById('quizBody').innerHTML = `
            <div style="text-align:center;padding:20px;">
                <div style="font-size:48px;margin-bottom:10px;">✅</div>
                <h2>Free Response Completed!</h2>
                <p style="color:var(--text-light);">Time: ${formatTime(Date.now() - quizStartTime)}</p>
                <p>Check your answers against the key terms below.</p>
            </div>
            ${results}
        `;
    }
    
    document.getElementById('quizFooter').innerHTML = `<button class="btn btn-primary" onclick="closeQuiz()">Close</button>`;
    
    // Clear saved progress
    localStorage.removeItem('quiz_progress_' + currentQuiz.id);
    
    // Record history
    addHistory('quiz', currentQuiz.name, currentQuiz.subject);
}

function formatTime(ms) {
    const mins = Math.floor(ms / 60000);
    const secs = Math.floor((ms % 60000) / 1000);
    return `${mins}m ${secs}s`;
}

function closeQuiz() {
    clearInterval(quizTimer);
    document.getElementById('quizModal').classList.remove('active');
    currentQuiz = null;
}

// ==================== HISTORY ====================
function renderHistory() {
    const data = getData();
    const container = document.getElementById('historyList');
    
    if (data.history.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📊</div><h3>No History Yet</h3><p>Start practicing to see your activity</p></div>`;
        return;
    }
    
    container.innerHTML = data.history.slice().reverse().map(h => `
        <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="font-weight:600;">${h.name}</div>
                <div style="font-size:13px;color:var(--text-light);">${h.subject} • ${h.type === 'quiz' ? 'Quiz' : 'Study Guide'}</div>
            </div>
            <div style="font-size:13px;color:var(--text-light);">${new Date(h.time).toLocaleString()}</div>
        </div>
    `).join('');
}

function addHistory(type, name, subject) {
    const data = getData();
    data.history.push({ type, name, subject, time: Date.now() });
    // Keep only last 100 entries
    if (data.history.length > 100) data.history = data.history.slice(-100);
    saveData(data);
}

function clearHistory() {
    if (!confirm('Clear all history?')) return;
    const data = getData();
    data.history = [];
    saveData(data);
    renderHistory();
}

// ==================== ADMIN: EDIT/DELETE ====================
function deleteItem(id, type) {
    if (!confirm('Delete this ' + type + '?')) return;
    const data = getData();
    if (type === 'set') data.sets = data.sets.filter(s => s.id !== id);
    if (type === 'guide') data.guides = data.guides.filter(g => g.id !== id);
    saveData(data);
    if (type === 'set') renderSets();
    if (type === 'guide') renderGuides();
}

function editItem(id, type) {
    const data = getData();
    const item = type === 'set' ? data.sets.find(s => s.id === id) : data.guides.find(g => g.id === id);
    if (!item) return;
    
    currentEditId = id;
    currentEditType = type;
    
    document.getElementById('editTitle').textContent = 'Edit ' + (type === 'set' ? 'Practice Set' : 'Study Guide');
    
    if (type === 'set') {
        document.getElementById('editBody').innerHTML = `
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="editName" class="form-input" value="${item.name}">
            </div>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" id="editSubject" class="form-input" value="${item.subject}">
            </div>
            <div class="form-group">
                <label class="form-label">Type</label>
                <select id="editType" class="form-select" disabled>
                    <option value="mcq" ${item.type === 'mcq' ? 'selected' : ''}>Multiple Choice</option>
                    <option value="frq" ${item.type === 'frq' ? 'selected' : ''}>Free Response</option>
                </select>
            </div>
        `;
    } else {
        document.getElementById('editBody').innerHTML = `
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="editName" class="form-input" value="${item.name}">
            </div>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" id="editSubject" class="form-input" value="${item.subject}">
            </div>
            <div class="form-group">
                <label class="form-label">Content (HTML)</label>
                <textarea id="editContent" class="form-textarea">${escapeHtml(item.content)}</textarea>
            </div>
        `;
    }
    
    document.getElementById('editModal').classList.add('active');
}

function openModal(type) {
    currentEditId = null;
    currentEditType = type;
    
    document.getElementById('editTitle').textContent = 'Add New ' + (type === 'set' ? 'Practice Set' : 'Study Guide');
    
    if (type === 'set') {
        document.getElementById('editBody').innerHTML = `
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="editName" class="form-input" placeholder="e.g., Evolution - Multiple Choice">
            </div>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" id="editSubject" class="form-input" placeholder="e.g., Biology">
            </div>
            <div class="form-group">
                <label class="form-label">Type</label>
                <select id="editType" class="form-select">
                    <option value="mcq">Multiple Choice</option>
                    <option value="frq">Free Response</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Questions (JSON format)</label>
                <textarea id="editQuestions" class="form-textarea" placeholder='[{"q":"Question text","options":["A","B","C","D"],"ans":0,"exp":"Explanation"}]'></textarea>
            </div>
        `;
    } else {
        document.getElementById('editBody').innerHTML = `
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="editName" class="form-input" placeholder="e.g., Evolution Study Guide">
            </div>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" id="editSubject" class="form-input" placeholder="e.g., Biology">
            </div>
            <div class="form-group">
                <label class="form-label">Content (HTML)</label>
                <textarea id="editContent" class="form-textarea" placeholder="<h2>Title</h2><p>Content...</p>"></textarea>
            </div>
        `;
    }
    
    document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    currentEditId = null;
    currentEditType = null;
}

function saveEdit() {
    const data = getData();
    const name = document.getElementById('editName').value.trim();
    const subject = document.getElementById('editSubject').value.trim();
    
    if (!name || !subject) {
        alert('Please fill in all required fields');
        return;
    }
    
    if (currentEditType === 'set') {
        if (currentEditId) {
            // Edit existing
            const set = data.sets.find(s => s.id === currentEditId);
            set.name = name;
            set.subject = subject;
        } else {
            // Add new
            const type = document.getElementById('editType').value;
            const questionsStr = document.getElementById('editQuestions').value.trim();
            let questions = [];
            try {
                questions = JSON.parse(questionsStr);
            } catch (e) {
                alert('Invalid JSON format for questions');
                return;
            }
            data.sets.push({
                id: 'set_' + Date.now(),
                name,
                subject,
                type,
                questions
            });
        }
        renderSets();
    } else {
        const content = document.getElementById('editContent').value;
        if (currentEditId) {
            const guide = data.guides.find(g => g.id === currentEditId);
            guide.name = name;
            guide.subject = subject;
            guide.content = content;
        } else {
            data.guides.push({
                id: 'guide_' + Date.now(),
                name,
                subject,
                content
            });
        }
        renderGuides();
    }
    
    saveData(data);
    closeEditModal();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ==================== INIT ====================
window.onload = function() {
    initData();
    renderSets();
};

// Auto-save on page unload
window.onbeforeunload = function() {
    if (currentQuiz) {
        saveProgress(true);
    }
};
</script>
</body>
</html>
